server:
  port: 8080

spring:
  application:
    name: multi-model-chat-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/multi_model_chat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-at-least-32-characters-secret-key}
    expire-seconds: ${JWT_EXPIRE_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
